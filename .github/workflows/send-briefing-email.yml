name: Send Morning Briefing Email

on:
  push:
    branches: [main]
    paths:
      - 'briefings/**.md'

jobs:
  send-email:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Get briefing content
        id: briefing
        run: |
          FILE=$(git diff --name-only HEAD~1 HEAD | grep 'briefings/' | head -1)
          if [ -z "$FILE" ]; then
            FILE=$(ls briefings/*.md 2>/dev/null | sort | tail -1)
          fi
          DATE=$(basename "$FILE" .md)
          echo "date=$DATE" >> $GITHUB_OUTPUT
          {
            echo "content<<BRIEFING_EOF"
            cat "$FILE"
            echo "BRIEFING_EOF"
          } >> $GITHUB_OUTPUT

      - name: Send email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          secure: false
          username: ${{ secrets.GMAIL_USERNAME }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          subject: "[${{ steps.briefing.outputs.date }}] 모닝 브리핑"
          body: ${{ steps.briefing.outputs.content }}
          to: mun4165@naver.com
          from: "Claude 브리핑 에이전트 <${{ secrets.GMAIL_USERNAME }}>"
          content_type: "text/plain; charset=UTF-8"
